# Prometheus scrape fragment for the UMBP master metrics server.
# Drop this file into the directory pointed to by `scrape_config_files`
# in your prometheus.yml (requires Prometheus >= 2.43).
#
# Example prometheus.yml:
#   scrape_config_files:
#     - /etc/prometheus/conf.d/*.yml
scrape_configs:
  - job_name: umbp_master
    static_configs:
      - targets: ['127.0.0.1:9091']
