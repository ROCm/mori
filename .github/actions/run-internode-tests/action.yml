name: Run internode tests
description: Shared internode test steps for CI and nightly workflows

inputs:
  container:
    description: Container name to exec into
    required: true
  ct:
    description: Container runtime (docker or podman)
    required: true
  workspace:
    description: GITHUB_WORKSPACE path
    required: true
  node1_host:
    description: Node 1 IP address
    required: true
  node2_host:
    description: Node 2 IP address
    required: true
  node2_port:
    description: Node 2 SSH port
    required: true
  node1_ifname:
    description: Node 1 network interface name
    required: true
  node2_ifname:
    description: Node 2 network interface name
    required: true
  ssh_opts:
    description: SSH options string
    required: true

runs:
  using: composite
  steps:
    - name: MORI-IO internode write sweep
      shell: bash
      run: |
        SCRIPT="${{ inputs.workspace }}/tools/run_internode_io_benchmark.sh"
        PORT=29120
        echo "=== MORI-IO internode benchmark: wide-write-sweep port=$PORT ==="
        NODE2_CMD=(
          ${{ inputs.ct }} exec ${{ inputs.container }} bash $SCRIPT
          --rank 1 --master-addr ${{ inputs.node1_host }} --master-port $PORT
          --ifname ${{ inputs.node2_ifname }}
          -- --op-type write --transfer-batch-size 128 --all
          --sweep-start-size 1024 --sweep-max-size 16777216 --iters 4
          --enable-sess --enable-batch-transfer
          --num-qp-per-transfer 2 --num-worker-threads 2
          --num-initiator-dev 8 --num-target-dev 8
        )
        ssh ${{ inputs.ssh_opts }} -p ${{ inputs.node2_port }} $(whoami)@${{ inputs.node2_host }} "${NODE2_CMD[*]}" &
        ${{ inputs.ct }} exec ${{ inputs.container }} bash $SCRIPT \
          --rank 0 --master-addr ${{ inputs.node1_host }} --master-port $PORT \
          --ifname ${{ inputs.node1_ifname }} \
          -- --op-type write --transfer-batch-size 128 --all \
          --sweep-start-size 1024 --sweep-max-size 16777216 --iters 4 \
          --enable-sess --enable-batch-transfer \
          --num-qp-per-transfer 2 --num-worker-threads 2 \
          --num-initiator-dev 8 --num-target-dev 8
        wait

    - name: MORI-IO internode read
      shell: bash
      run: |
        SCRIPT="${{ inputs.workspace }}/tools/run_internode_io_benchmark.sh"
        PORT=29121
        echo "=== MORI-IO internode benchmark: batch-session-read port=$PORT ==="
        NODE2_CMD=(
          ${{ inputs.ct }} exec ${{ inputs.container }} bash $SCRIPT
          --rank 1 --master-addr ${{ inputs.node1_host }} --master-port $PORT
          --ifname ${{ inputs.node2_ifname }}
          -- --op-type read --buffer-size 4096 --transfer-batch-size 128 --iters 8
          --enable-batch-transfer --enable-sess --poll_cq_mode event
          --num-qp-per-transfer 2 --num-worker-threads 2
          --num-initiator-dev 8 --num-target-dev 8
        )
        ssh ${{ inputs.ssh_opts }} -p ${{ inputs.node2_port }} $(whoami)@${{ inputs.node2_host }} "${NODE2_CMD[*]}" &
        ${{ inputs.ct }} exec ${{ inputs.container }} bash $SCRIPT \
          --rank 0 --master-addr ${{ inputs.node1_host }} --master-port $PORT \
          --ifname ${{ inputs.node1_ifname }} \
          -- --op-type read --buffer-size 4096 --transfer-batch-size 128 --iters 8 \
          --enable-batch-transfer --enable-sess --poll_cq_mode event \
          --num-qp-per-transfer 2 --num-worker-threads 2 \
          --num-initiator-dev 8 --num-target-dev 8
        wait

    - name: MORI-EP internode normal kernel bench
      shell: bash
      run: |
        SCRIPT="${{ inputs.workspace }}/tools/run_internode_test.sh"
        PORT=29140
        for KERNEL in v1 v1_ll; do
          for TOKENS in 64 128 1024 2048 4096; do
            echo "=== bench kernel=$KERNEL max-tokens=$TOKENS port=$PORT ==="
            NODE2_CMD=(
              ${{ inputs.ct }} exec -e MORI_INTERNODE_TIMEOUT=600 ${{ inputs.container }} bash $SCRIPT
              --rank 1 --master-addr ${{ inputs.node1_host }} --master-port $PORT
              --ifname ${{ inputs.node2_ifname }}
              --cmd bench --kernel-type $KERNEL --max-tokens $TOKENS
            )
            ssh ${{ inputs.ssh_opts }} -p ${{ inputs.node2_port }} $(whoami)@${{ inputs.node2_host }} "${NODE2_CMD[*]}" &
            ${{ inputs.ct }} exec -e MORI_INTERNODE_TIMEOUT=600 ${{ inputs.container }} bash $SCRIPT \
              --rank 0 --master-addr ${{ inputs.node1_host }} --master-port $PORT \
              --ifname ${{ inputs.node1_ifname }} \
              --cmd bench --kernel-type $KERNEL --max-tokens $TOKENS
            wait
            sleep 1
            PORT=$((PORT + 1))
          done
        done

    - name: MORI-EP internode normal kernel stress
      shell: bash
      run: |
        SCRIPT="${{ inputs.workspace }}/tools/run_internode_test.sh"
        PORT=29160
        for KERNEL in v1 v1_ll; do
          for TOKENS in 64 128 1024 2048 4096; do
            echo "=== stress kernel=$KERNEL max-tokens=$TOKENS port=$PORT ==="
            NODE2_CMD=(
              ${{ inputs.ct }} exec -e MORI_INTERNODE_TIMEOUT=600 ${{ inputs.container }} bash $SCRIPT
              --rank 1 --master-addr ${{ inputs.node1_host }} --master-port $PORT
              --ifname ${{ inputs.node2_ifname }}
              --cmd stress --kernel-type $KERNEL --max-tokens $TOKENS
            )
            ssh ${{ inputs.ssh_opts }} -p ${{ inputs.node2_port }} $(whoami)@${{ inputs.node2_host }} "${NODE2_CMD[*]}" &
            ${{ inputs.ct }} exec -e MORI_INTERNODE_TIMEOUT=600 ${{ inputs.container }} bash $SCRIPT \
              --rank 0 --master-addr ${{ inputs.node1_host }} --master-port $PORT \
              --ifname ${{ inputs.node1_ifname }} \
              --cmd stress --kernel-type $KERNEL --max-tokens $TOKENS
            wait
            sleep 1
            PORT=$((PORT + 1))
          done
        done

    - name: MORI-EP internode async kernel test
      shell: bash
      run: |
        SCRIPT="${{ inputs.workspace }}/tools/run_internode_test.sh"
        PORT=29180
        for TOKENS in 64 128; do
          echo "=== async_ll test max-tokens=$TOKENS port=$PORT ==="
          NODE2_CMD=(
            ${{ inputs.ct }} exec
            -e GPU_PER_NODE=8 -e MORI_ENABLE_SDMA=1 -e MORI_INTERNODE_TIMEOUT=600
            ${{ inputs.container }} bash $SCRIPT
            --rank 1 --master-addr ${{ inputs.node1_host }} --master-port $PORT
            --ifname ${{ inputs.node2_ifname }}
            --cmd test --kernel-type async_ll
            --quant-type none --dtype bf16 --max-tokens $TOKENS
          )
          ssh ${{ inputs.ssh_opts }} -p ${{ inputs.node2_port }} $(whoami)@${{ inputs.node2_host }} "${NODE2_CMD[*]}" &
          ${{ inputs.ct }} exec \
            -e GPU_PER_NODE=8 \
            -e MORI_ENABLE_SDMA=1 \
            -e MORI_INTERNODE_TIMEOUT=600 \
            ${{ inputs.container }} bash $SCRIPT \
            --rank 0 --master-addr ${{ inputs.node1_host }} --master-port $PORT \
            --ifname ${{ inputs.node1_ifname }} \
            --cmd test --kernel-type async_ll \
            --quant-type none --dtype bf16 --max-tokens $TOKENS
          wait
          sleep 1
          PORT=$((PORT + 1))
        done
