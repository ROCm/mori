name: pre-commit autofix

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: github.event.label.name == 'fix-precommit'
    runs-on: ubuntu-latest

    steps:
      - name: Remove trigger label (so it can be re-applied next time)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'fix-precommit',
            }).catch(() => {});

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: pip install pre-commit

      # First pass: let pre-commit auto-fix what it can
      - name: Run pre-commit (auto-fix pass)
        id: fix
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          set +e
          pre-commit run --from-ref "$BASE_SHA" --to-ref HEAD 2>&1
          set -e

          if git diff --quiet; then
            echo "files_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "files_changed=true" >> "$GITHUB_OUTPUT"
            git diff --name-only > /tmp/changed_files.txt
            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            cat /tmp/changed_files.txt >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push auto-fixes
        if: steps.fix.outputs.files_changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-fix pre-commit issues [skip ci]"
          git push

      # Second pass: check if anything still fails (needs manual fix)
      - name: Run pre-commit (check pass)
        id: check
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          set +e
          OUTPUT=$(pre-commit run --from-ref "$BASE_SHA" --to-ref HEAD 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          TRUNCATED=$(echo "$OUTPUT" | head -200)
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TRUNCATED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post result comment
        uses: actions/github-script@v7
        with:
          script: |
            const filesChanged = '${{ steps.fix.outputs.files_changed }}' === 'true';
            const changedFiles  = `${{ steps.fix.outputs.changed_files }}`;
            const exitCode      = parseInt('${{ steps.check.outputs.exit_code }}');
            const precommitOut  = `${{ steps.check.outputs.output }}`;

            const lines = [];

            if (filesChanged) {
              lines.push('### ✅ Auto-fixed and committed');
              lines.push('');
              lines.push('The following files were modified:');
              lines.push('```');
              lines.push(changedFiles.trim());
              lines.push('```');
              lines.push('');
            }

            if (exitCode === 0) {
              lines.push(filesChanged
                ? '🎉 All issues resolved automatically — no manual action needed.'
                : '### ✅ Already clean — no pre-commit issues found.');
            } else {
              lines.push('### ❌ Remaining issues require manual fix');
              lines.push('');
              lines.push('<details><summary>pre-commit output</summary>');
              lines.push('');
              lines.push('```');
              lines.push(precommitOut.trim());
              lines.push('```');
              lines.push('</details>');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: lines.join('\n'),
            });
