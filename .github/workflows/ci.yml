name: MoRI CI test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          cat << 'EOF' > /tmp/matrix.json
          {
            "include": [
              {
                "runner": "label-1",
                "platform": "MI325X+Thor2",
                "node1_host": "10.36.40.214",
                "node2_host": "tus1-p8-g27",
                "node2_port": 22,
                "node1_ifname": "eno1",
                "node2_ifname": "eno1"
              }
              // add more runners here:
              // {
              //   "runner": "label-2",
              //   "platform": "...",
              //   "node1_host": "...",
              //   "node2_host": "...",
              //   "node2_port": 22,
              //   "node1_ifname": "...",
              //   "node2_ifname": "..."
              // }
            ]
          }
          EOF
          echo "matrix=$(grep -v '//' /tmp/matrix.json | tr -d '\n')" >> $GITHUB_OUTPUT

  build:
    name: mori build (platform:${{ matrix.platform }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    container:
      image: rocm/pytorch-private:mori_rocm7.2_ubuntu22.04_py3.10_pytorch_bnxt_ionic
      credentials:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      options: >-
        --device=/dev/kfd --device=/dev/dri --device=/dev/infiniband
        --group-add video --ipc=host --privileged
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and install mori
        run: BUILD_EXAMPLES=ON pip install .

      - name: Verify installation
        run: python -c "import mori; print('OK')"

  intranode-test:
    name: mori intranode test (platform:${{ matrix.platform }})
    needs: [setup, build]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    container:
      image: rocm/pytorch-private:mori_rocm7.2_ubuntu22.04_py3.10_pytorch_bnxt_ionic
      credentials:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      options: >-
        --device=/dev/kfd --device=/dev/dri --device=/dev/infiniband
        --group-add video --ipc=host --privileged
        -v /root/.ssh:/root/.ssh
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}:$PYTHONPATH
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mori
        run: |
          cd $GITHUB_WORKSPACE
          BUILD_EXAMPLES=ON pip install .

      - name: MORI-EP
        run: |
          cd $GITHUB_WORKSPACE
          timeout 300 pytest tests/python/ops/test_dispatch_combine.py -v

      - name: MORI-EP bench
        run: |
          cd $GITHUB_WORKSPACE
          timeout 120 python3 tests/python/ops/bench_dispatch_combine.py

      - name: MORI-IO
        run: |
          cd $GITHUB_WORKSPACE
          timeout 60 pytest tests/python/io/ -v

      - name: MORI-IR
        env:
          HOME: /tmp
        run: |
          cd $GITHUB_WORKSPACE
          timeout 60 torchrun --nproc_per_node=2 examples/shmem/ir/test_triton_shmem.py
          timeout 60 torchrun --nproc_per_node=8 examples/shmem/ir/test_triton_allreduce.py
          MORI_DISABLE_P2P=ON timeout 60 torchrun --nproc_per_node=8 examples/shmem/ir/test_triton_allreduce.py

      - name: MORI-CPP shmem (P2P)
        run: |
          cd $GITHUB_WORKSPACE
          timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_thread
          timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_get_thread
          # timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_imm_thread
          timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_signal_thread
          timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_nonfetch_thread
          timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_fetch_thread

      - name: MORI-CPP shmem (IBGDA)
        run: |
          cd $GITHUB_WORKSPACE
          MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_thread
          MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_get_thread
          # MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_imm_thread
          MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_signal_thread
          MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_nonfetch_thread
          MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_fetch_thread

      - name: MORI-CCL/shmem
        run: |
          cd $GITHUB_WORKSPACE
          timeout 600 pytest tests/python/shmem/test_api.py -v

  internode-test:
    name: mori internode test (platform:${{ matrix.platform }})
    needs: [setup, build, intranode-test]
    if: needs.build.result == 'success'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    timeout-minutes: 30
    env:
      IMAGE: rocm/pytorch-private:mori_rocm7.2_ubuntu22.04_py3.10_pytorch_bnxt_ionic
      CONTAINER: mori_ci_${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo '${{ secrets.DOCKER_PASSWORD }}' \
            | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

      - name: Start container on node1
        run: |
          docker rm -f $CONTAINER 2>/dev/null || true
          docker run -d \
            --name $CONTAINER \
            --network=host \
            --device=/dev/kfd --device=/dev/dri --device=/dev/infiniband \
            --group-add video --ipc=host --privileged \
            -v /root/.ssh:/root/.ssh \
            -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
            $IMAGE sleep infinity

      - name: Start container on node2
        run: |
          ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "
            echo '${{ secrets.DOCKER_PASSWORD }}' \
              | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
            docker rm -f $CONTAINER 2>/dev/null || true
            mkdir -p $GITHUB_WORKSPACE
            docker run -d \
              --name $CONTAINER \
              --network=host \
              --device=/dev/kfd --device=/dev/dri --device=/dev/infiniband \
              --group-add video --ipc=host --privileged \
              -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
              $IMAGE sleep infinity
          "

      - name: Sync source to node2
        run: |
          rsync -az --exclude='.git' \
            -e "ssh -p ${{ matrix.node2_port }}" \
            $GITHUB_WORKSPACE/ \
            root@${{ matrix.node2_host }}:$GITHUB_WORKSPACE/

      - name: Install mori and deps (node1)
        run: |
          docker exec $CONTAINER \
            bash -c "cd $GITHUB_WORKSPACE && BUILD_EXAMPLES=ON pip install . && pip install prettytable"

      - name: Install mori and deps (node2)
        run: |
          ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} \
            "docker exec $CONTAINER bash -c 'cd $GITHUB_WORKSPACE && BUILD_EXAMPLES=ON pip install . && pip install prettytable'"

      - name: MORI-EP internode normal kernel bench
        run: |
          SCRIPT="$GITHUB_WORKSPACE/tools/run_internode_test.sh"
          for KERNEL in v1 v1_ll; do
            for TOKENS in 64 128 1024 4096; do
              echo "=== bench kernel=$KERNEL max-tokens=$TOKENS ==="
              NODE2_CMD="docker exec $CONTAINER bash $SCRIPT --rank 1 --master-addr ${{ matrix.node1_host }} --ifname ${{ matrix.node2_ifname }} --cmd bench --kernel-type $KERNEL --max-tokens $TOKENS"
              ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "$NODE2_CMD" &
              docker exec $CONTAINER bash $SCRIPT \
                --rank 0 --master-addr ${{ matrix.node1_host }} \
                --ifname ${{ matrix.node1_ifname }} \
                --cmd bench --kernel-type $KERNEL --max-tokens $TOKENS
              wait
            done
          done

      - name: MORI-EP internode normal kernel stress
        run: |
          SCRIPT="$GITHUB_WORKSPACE/tools/run_internode_test.sh"
          for KERNEL in v1 v1_ll; do
            for TOKENS in 64 128 1024 4096; do
              echo "=== stress kernel=$KERNEL max-tokens=$TOKENS ==="
              NODE2_CMD="docker exec $CONTAINER bash $SCRIPT --rank 1 --master-addr ${{ matrix.node1_host }} --ifname ${{ matrix.node2_ifname }} --cmd stress --kernel-type $KERNEL --max-tokens $TOKENS"
              ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "$NODE2_CMD" &
              docker exec $CONTAINER bash $SCRIPT \
                --rank 0 --master-addr ${{ matrix.node1_host }} \
                --ifname ${{ matrix.node1_ifname }} \
                --cmd stress --kernel-type $KERNEL --max-tokens $TOKENS
              wait
            done
          done

      - name: Cleanup node1 container
        if: always()
        run: docker rm -f $CONTAINER || true

      - name: Cleanup node2 container
        if: always()
        run: |
          ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} \
            "docker rm -f $CONTAINER || true"
