name: MoRI CI test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE: rocm/mori:ci
  CONTAINER: mori_ci_${{ github.run_id }}

jobs:
  build:
    name: mori build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mi350-bnxt
            runner: [self-hosted, mi350-bnxt]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build CI image
        run: docker build --network=host -t $IMAGE -f docker/Dockerfile.dev .

      - name: Start container
        run: |
          docker rm -f $CONTAINER 2>/dev/null || true
          ./docker/ci_run.sh --name $CONTAINER \
            -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
            -w $GITHUB_WORKSPACE \
            $IMAGE sleep infinity
          docker exec $CONTAINER \
            git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Build and install mori
        run: docker exec $CONTAINER pip install .

      - name: Build and install mori (with examples)
        run: docker exec $CONTAINER bash -c "BUILD_EXAMPLES=ON pip install ."

      - name: Verify installation
        run: docker exec $CONTAINER python -c "import mori; print('OK')"

      - name: Cleanup
        if: always()
        run: |
          docker exec $CONTAINER chown -R $(id -u):$(id -g) $GITHUB_WORKSPACE 2>/dev/null || true
          docker rm -f $CONTAINER || true

  intranode-test:
    name: mori intranode test (${{ matrix.platform }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mi350-bnxt
            runner: [self-hosted, mi350-bnxt]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build CI image
        run: docker build --network=host -t $IMAGE -f docker/Dockerfile.dev .

      - name: Start container
        run: |
          docker rm -f $CONTAINER 2>/dev/null || true
          ./docker/ci_run.sh --name $CONTAINER \
            -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
            -w $GITHUB_WORKSPACE \
            $IMAGE sleep infinity
          docker exec $CONTAINER \
            git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install mori
        run: |
          docker exec $CONTAINER bash -c \
            "BUILD_EXAMPLES=ON pip install . && pip install prettytable"

      - name: MORI-EP
        run: |
          docker exec -e PYTHONPATH=$GITHUB_WORKSPACE $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            timeout 300 pytest tests/python/ops/test_dispatch_combine_intranode.py -v
            timeout 300 pytest tests/python/ops/test_dispatch_combine_internode_v1.py -v
            timeout 300 pytest tests/python/ops/test_dispatch_combine_async_ll.py -v
          "

      - name: MORI-EP bench
        run: |
          docker exec -e PYTHONPATH=$GITHUB_WORKSPACE $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            timeout 120 python3 tests/python/ops/bench_dispatch_combine.py
          "

      - name: MORI-IO
        run: |
          docker exec -e PYTHONPATH=$GITHUB_WORKSPACE $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            timeout 60 pytest tests/python/io/ -v
            MORI_IO_XGMI_SCATTER_GATHER_THRESHOLD=4 \
              timeout 120 pytest tests/python/io/test_discrete_buffer.py -v -k 'not performance'
          "

      - name: MORI-IR
        run: |
          docker exec -e PYTHONPATH=$GITHUB_WORKSPACE -e HOME=/tmp $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            timeout 60 torchrun --nproc_per_node=2 examples/shmem/ir/test_triton_shmem.py
            timeout 60 torchrun --nproc_per_node=8 examples/shmem/ir/test_triton_allreduce.py
            MORI_DISABLE_P2P=ON timeout 60 torchrun --nproc_per_node=8 examples/shmem/ir/test_triton_allreduce.py
          "

      - name: MORI-CPP shmem (P2P)
        run: |
          docker exec $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_thread
            timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_get_thread
            timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_signal_thread
            timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_nonfetch_thread
            timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_fetch_thread
          "

      - name: MORI-CPP shmem (IBGDA)
        run: |
          docker exec $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_thread
            MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_get_thread
            MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/concurrent_put_signal_thread
            MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_nonfetch_thread
            MORI_DISABLE_P2P=ON timeout 60 mpirun --allow-run-as-root -np 2 ./build/examples/atomic_fetch_thread
          "

      - name: MORI-CCL/shmem
        run: |
          docker exec -e PYTHONPATH=$GITHUB_WORKSPACE $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            timeout 600 pytest tests/python/shmem/test_api.py -v
          "

      - name: MORI-EP async kernel bench (intranode)
        run: |
          docker exec -e PYTHONPATH=$GITHUB_WORKSPACE $CONTAINER bash -c "
            cd $GITHUB_WORKSPACE
            PORT=12390
            for TOKENS in 64 128; do
              echo \"=== async_ll bench max-tokens=\$TOKENS port=\$PORT ===\"
              MORI_ENABLE_SDMA=1 GPU_PER_NODE=8 \
              timeout 120 torchrun \
                --nnodes=1 --node_rank=0 --nproc_per_node=1 \
                --master_addr=127.0.0.1 --master_port=\$PORT \
                examples/ops/dispatch_combine/test_dispatch_combine_internode.py \
                --kernel-type async_ll --num-qp 2 --cmd bench \
                --dtype bf16 --max-tokens \$TOKENS
              PORT=\$((PORT + 1))
            done
          "

      - name: Cleanup
        if: always()
        run: |
          docker exec $CONTAINER chown -R $(id -u):$(id -g) $GITHUB_WORKSPACE 2>/dev/null || true
          docker rm -f $CONTAINER || true

  internode-test:
    name: mori internode test (${{ matrix.platform }})
    needs: [build, intranode-test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mi350-bnxt
            runner: [self-hosted, mi350-bnxt]
            node1_host: 10.245.40.58
            node2_host: cv350-zts-gtu-g40e-08
            node2_port: 22
            node1_ifname: fenic0
            node2_ifname: fenic0
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build CI image
        run: docker build --network=host -t $IMAGE -f docker/Dockerfile.dev .

      - name: Start container on node1
        run: |
          sudo docker rm -f $CONTAINER 2>/dev/null || true
          sudo ./docker/ci_run.sh --name $CONTAINER \
            -v /root/.ssh:/root/.ssh \
            -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
            -w $GITHUB_WORKSPACE \
            $IMAGE sleep infinity
          sudo docker exec $CONTAINER \
            git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Start container on node2
        run: |
          sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "
            docker rm -f $CONTAINER 2>/dev/null || true
            mkdir -p $GITHUB_WORKSPACE
          "
          sudo rsync -az --exclude='.git' \
            -e "ssh -p ${{ matrix.node2_port }}" \
            $GITHUB_WORKSPACE/ \
            root@${{ matrix.node2_host }}:$GITHUB_WORKSPACE/
          sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "
            cd $GITHUB_WORKSPACE &&
            docker build --network=host -t $IMAGE -f docker/Dockerfile.dev . &&
            ./docker/ci_run.sh --name $CONTAINER \
              -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
              -w $GITHUB_WORKSPACE \
              $IMAGE sleep infinity &&
            docker exec $CONTAINER \
              git config --global --add safe.directory $GITHUB_WORKSPACE
          "

      - name: Install mori (node1)
        run: |
          sudo docker exec $CONTAINER bash -c \
            "cd $GITHUB_WORKSPACE && BUILD_EXAMPLES=ON pip install . && pip install prettytable"

      - name: Install mori (node2)
        run: |
          sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} \
            "docker exec $CONTAINER bash -c 'cd $GITHUB_WORKSPACE && BUILD_EXAMPLES=ON pip install . && pip install prettytable'"

      - name: MORI-IO internode benchmark
        run: |
          SCRIPT="$GITHUB_WORKSPACE/tools/run_internode_io_benchmark.sh"
          PORT=12320

          run_case() {
            local NAME="$1"
            shift
            local BENCH_ARGS
            printf -v BENCH_ARGS '%q ' "$@"
            echo "=== MORI-IO internode benchmark: $NAME port=$PORT ==="
            NODE2_CMD="docker exec $CONTAINER bash $SCRIPT --rank 1 --master-addr ${{ matrix.node1_host }} --master-port $PORT --ifname ${{ matrix.node2_ifname }} -- ${BENCH_ARGS}"
            sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "$NODE2_CMD" &
            sudo docker exec $CONTAINER bash $SCRIPT \
              --rank 0 --master-addr ${{ matrix.node1_host }} --master-port $PORT \
              --ifname ${{ matrix.node1_ifname }} \
              -- "$@"
            wait
            PORT=$((PORT + 1))
          }

          run_case "wide-write-sweep" \
            --op-type write \
            --transfer-batch-size 128 \
            --all \
            --sweep-start-size 1024 \
            --sweep-max-size 16777216 \
            --iters 4 \
            --enable-sess \
            --enable-batch-transfer \
            --num-qp-per-transfer 2 \
            --num-worker-threads 2 \
            --num-initiator-dev 8 \
            --num-target-dev 8

          run_case "batch-session-read-event-noncontig" \
            --op-type read \
            --buffer-size 4096 \
            --transfer-batch-size 128 \
            --iters 8 \
            --enable-batch-transfer \
            --enable-sess \
            --poll_cq_mode event \
            --num-qp-per-transfer 2 \
            --num-worker-threads 2 \
            --num-initiator-dev 8 \
            --num-target-dev 8

      - name: MORI-EP internode normal kernel bench
        run: |
          SCRIPT="$GITHUB_WORKSPACE/tools/run_internode_test.sh"
          PORT=12340
          for KERNEL in v1 v1_ll; do
            for TOKENS in 64 128 1024 4096; do
              echo "=== bench kernel=$KERNEL max-tokens=$TOKENS port=$PORT ==="
              NODE2_CMD="docker exec $CONTAINER bash $SCRIPT --rank 1 --master-addr ${{ matrix.node1_host }} --master-port $PORT --ifname ${{ matrix.node2_ifname }} --cmd bench --kernel-type $KERNEL --max-tokens $TOKENS"
              sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "$NODE2_CMD" &
              sudo docker exec $CONTAINER bash $SCRIPT \
                --rank 0 --master-addr ${{ matrix.node1_host }} --master-port $PORT \
                --ifname ${{ matrix.node1_ifname }} \
                --cmd bench --kernel-type $KERNEL --max-tokens $TOKENS
              wait
              PORT=$((PORT + 1))
            done
          done

      - name: MORI-EP internode normal kernel stress
        run: |
          SCRIPT="$GITHUB_WORKSPACE/tools/run_internode_test.sh"
          PORT=12360
          for KERNEL in v1 v1_ll; do
            for TOKENS in 64 128 1024 4096; do
              echo "=== stress kernel=$KERNEL max-tokens=$TOKENS port=$PORT ==="
              NODE2_CMD="docker exec $CONTAINER bash $SCRIPT --rank 1 --master-addr ${{ matrix.node1_host }} --master-port $PORT --ifname ${{ matrix.node2_ifname }} --cmd stress --kernel-type $KERNEL --max-tokens $TOKENS"
              sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "$NODE2_CMD" &
              sudo docker exec $CONTAINER bash $SCRIPT \
                --rank 0 --master-addr ${{ matrix.node1_host }} --master-port $PORT \
                --ifname ${{ matrix.node1_ifname }} \
                --cmd stress --kernel-type $KERNEL --max-tokens $TOKENS
              wait
              PORT=$((PORT + 1))
            done
          done

      - name: MORI-EP internode async kernel test
        run: |
          SCRIPT="$GITHUB_WORKSPACE/tools/run_internode_test.sh"
          PORT=12380
          for TOKENS in 64 128; do
            echo "=== async_ll test max-tokens=$TOKENS port=$PORT ==="
            NODE2_CMD="docker exec -e GPU_PER_NODE=8 -e MORI_DISABLE_P2P=1 $CONTAINER bash $SCRIPT --rank 1 --master-addr ${{ matrix.node1_host }} --master-port $PORT --ifname ${{ matrix.node2_ifname }} --cmd test --kernel-type async_ll --quant-type none --dtype bf16 --max-tokens $TOKENS"
            sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} "$NODE2_CMD" &
            sudo docker exec \
              -e GPU_PER_NODE=8 \
              -e MORI_DISABLE_P2P=1 \
              $CONTAINER bash $SCRIPT \
              --rank 0 --master-addr ${{ matrix.node1_host }} --master-port $PORT \
              --ifname ${{ matrix.node1_ifname }} \
              --cmd test --kernel-type async_ll \
              --quant-type none --dtype bf16 --max-tokens $TOKENS
            wait
            PORT=$((PORT + 1))
          done

      - name: Cleanup node1
        if: always()
        run: |
          sudo docker exec $CONTAINER chown -R $(id -u):$(id -g) $GITHUB_WORKSPACE 2>/dev/null || true
          sudo docker rm -f $CONTAINER || true

      - name: Cleanup node2
        if: always()
        run: |
          sudo ssh -p ${{ matrix.node2_port }} root@${{ matrix.node2_host }} \
            "docker rm -f $CONTAINER || true"
