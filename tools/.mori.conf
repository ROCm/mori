# MORI Ionic/Pollara QoS configuration.
#
# This template is copied to ~/.mori.conf on the first `mori setup`.
# Edit that copy; package upgrades may replace this template.

# PFC / DSCP / scheduling.
IONIC_ROCE_PRIO=3
IONIC_ROCE_DSCP=26
IONIC_CNP_PRIO=6
IONIC_CNP_DSCP=48
IONIC_ROCE_BW=90
IONIC_CNP_RATE_LIMIT=10

# DCQCN.
IONIC_DCQCN_INDEX=1
IONIC_DCQCN_TOKEN_BUCKET_SIZE=800000
IONIC_DCQCN_AI_RATE=160
IONIC_DCQCN_ALPHA_UPDATE_INTERVAL=1
IONIC_DCQCN_ALPHA_UPDATE_G=512
IONIC_DCQCN_INITIAL_ALPHA_VALUE=64
IONIC_DCQCN_RATE_INCREASE_BYTE_COUNT=431068
IONIC_DCQCN_HAI_RATE=300
IONIC_DCQCN_RATE_REDUCE_MONITOR_PERIOD=1
IONIC_DCQCN_RATE_INCREASE_THRESHOLD=1
IONIC_DCQCN_RATE_INCREASE_INTERVAL=1
