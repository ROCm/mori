syntax = "proto3";
package umbp;

import "umbp.proto";

service UMBPPeer {
  rpc GetPeerInfo(GetPeerInfoRequest) returns (GetPeerInfoResponse);

  // SSD staging (unchanged in this redesign).
  rpc AllocateWriteSlot(AllocateWriteSlotRequest) returns (AllocateWriteSlotResponse);
  rpc CommitSsdWrite   (CommitSsdWriteRequest)   returns (CommitSsdWriteResponse);
  rpc PrepareSsdRead   (PrepareSsdReadRequest)   returns (PrepareSsdReadResponse);
  rpc ReleaseSsdLease  (ReleaseSsdLeaseRequest)  returns (ReleaseSsdLeaseResponse);

  // DRAM/HBM allocator + key map (new — peer is now the canonical owner).
  rpc AllocateSlot(AllocateSlotRequest) returns (AllocateSlotResponse);
  rpc CommitSlot  (CommitSlotRequest)   returns (CommitSlotResponse);
  rpc AbortSlot   (AbortSlotRequest)    returns (AbortSlotResponse);
  rpc ResolveKey  (ResolveKeyRequest)   returns (ResolveKeyResponse);
  rpc EvictKey    (EvictKeyRequest)     returns (EvictKeyResponse);

  rpc BatchAllocateSlots(BatchAllocateSlotsRequest) returns (BatchAllocateSlotsResponse);
  rpc BatchCommitSlots  (BatchCommitSlotsRequest)   returns (BatchCommitSlotsResponse);
  rpc BatchAbortSlots   (BatchAbortSlotsRequest)    returns (BatchAbortSlotsResponse);
  rpc BatchResolveKeys  (BatchResolveKeysRequest)   returns (BatchResolveKeysResponse);
}

// ============================================================
//  Handshake
// ============================================================

message GetPeerInfoRequest {}
message GetPeerInfoResponse {
  bytes  engine_desc           = 1;
  uint64 ssd_capacity          = 3;
  uint64 ssd_available         = 4;
  bytes  ssd_staging_mem_desc  = 6;  // packed MemoryDesc for dedicated SSD staging buffer
  uint64 ssd_staging_size      = 7;  // total staging buffer size

  // DRAM/HBM buffer descriptors — peer-owned in the new design, exposed
  // here so writers can hydrate first-contact peers without going through
  // AllocateSlot or ResolveKey first.
  repeated BufferMemoryDesc dram_memory_descs = 8;
  uint64 dram_page_size                       = 9;
}

// ============================================================
//  SSD slot machinery (unchanged)
// ============================================================

message AllocateWriteSlotRequest {
  uint64 size = 1;
}
message AllocateWriteSlotResponse {
  bool   success        = 1;
  uint64 staging_offset = 2;
  uint64 lease_id       = 3;
  uint64 lease_ttl_ms   = 4;
}

message CommitSsdWriteRequest {
  string key              = 1;
  uint64 staging_offset   = 2;
  uint64 size             = 3;
  uint32 store_index      = 4;
  string allocation_id    = 5;  // historical echo from RoutePut; ignored in the new design
  uint64 lease_id         = 6;
}
message CommitSsdWriteResponse {
  bool   success          = 1;
  string ssd_location_id  = 2;
}

message PrepareSsdReadRequest {
  string key              = 1;
  string ssd_location_id  = 2;
  uint64 size             = 3;
}
message PrepareSsdReadResponse {
  bool   success          = 1;
  uint64 staging_offset   = 2;
  uint64 lease_id         = 3;
  uint64 lease_ttl_ms     = 4;
}

message ReleaseSsdLeaseRequest {
  uint64 lease_id = 1;
}
message ReleaseSsdLeaseResponse {
  bool success = 1;
}

// ============================================================
//  DRAM/HBM allocator + key map (new)
// ============================================================

// Reserve a peer-local pending slot for `size` bytes on `tier`.  Failure
// modes (ENOSPC etc.) are signaled via `outcome`, not an RPC error, so
// the writer can retry RoutePut with `exclude_nodes`.  `slot_id` is
// opaque; echoed back by Commit / Abort.
message AllocateSlotRequest {
  uint64   size = 1;
  TierType tier = 2;
  string   key  = 3;  // owned_ dedup (master-index-lag fallback)
}
// AllocateSlot / BatchAllocateSlots per-entry outcome.  Only ALLOCATED
// populates slot_id / pages / descs / pending_ttl_ms.
enum AllocateSlotOutcome {
  ALLOCATE_SLOT_OUTCOME_FAILED         = 0;  // ENOSPC / bad tier / clear-pending
  ALLOCATE_SLOT_OUTCOME_ALLOCATED      = 1;
  ALLOCATE_SLOT_OUTCOME_ALREADY_EXISTS = 2;  // owned_[key] dedup hit
}

message AllocateSlotResponse {
  AllocateSlotOutcome outcome        = 1;
  uint64              slot_id        = 2;
  repeated PageLocation       pages  = 3;
  uint64              page_size      = 4;
  repeated BufferMemoryDesc   descs  = 5;  // dedup'd by buffer_index
  uint64              pending_ttl_ms = 6;  // single TTL in the system
}

// Commit moves pending → owned.  After a successful commit the peer
// queues a KvEvent{ADD, key, tier, size} for the next heartbeat.
message CommitSlotRequest {
  uint64 slot_id = 1;
  string key     = 2;
}
message CommitSlotResponse {
  bool success = 1;  // false if slot already reaped or unknown
}

// Abort drops a pending slot.  Idempotent: late or duplicate Abort for
// an already-reaped slot returns success=true.
message AbortSlotRequest {
  uint64 slot_id = 1;
}
message AbortSlotResponse {
  bool success = 1;
}

// Resolve a key the writer has been routed to.  Returns the page set
// the reader needs to RDMA from.  Peer bumps its in-flight read counter
// for `key` to defer concurrent eviction (Bug #7 resolution).
message ResolveKeyRequest {
  string key = 1;
}
message ResolveKeyResponse {
  bool   found     = 1;
  repeated PageLocation pages = 2;
  uint64 page_size = 3;
  repeated BufferMemoryDesc descs = 4;
  uint64 size      = 5;
}

// Master-driven eviction.  Idempotent: already-evicted keys produce a
// zero-bytes entry or are omitted; master tolerates either since the
// REMOVE events shipped on the next heartbeat are the source of truth.
message EvictKeyEntry {
  string key         = 1;
  uint64 bytes_freed = 2;  // 0 if the key was already gone or held a read lease
}
message EvictKeyRequest {
  repeated string keys = 1;
}
message EvictKeyResponse {
  repeated EvictKeyEntry evicted = 1;
}

// ============================================================
//  Batch variants
// ============================================================

message BatchAllocateSlotsRequest {
  repeated AllocateSlotRequest entries = 1;
}
message BatchAllocateSlotsResponse {
  repeated AllocateSlotResponse entries = 1;
}

message BatchCommitSlotEntry {
  uint64 slot_id = 1;
  string key     = 2;
}
message BatchCommitSlotsRequest {
  repeated BatchCommitSlotEntry entries = 1;
}
message BatchCommitSlotsResponse {
  repeated bool success = 1;
}

message BatchAbortSlotsRequest {
  repeated uint64 slot_ids = 1;
}
message BatchAbortSlotsResponse {
  repeated bool success = 1;
}

message BatchResolveKeysRequest {
  repeated string keys = 1;
}
message BatchResolveKeysResponse {
  repeated ResolveKeyResponse entries = 1;
}
