syntax = "proto3";
package umbp;

import "umbp.proto";

service UMBPPeer {
  rpc GetPeerInfo(GetPeerInfoRequest) returns (GetPeerInfoResponse);

  // SSD read staging.  The direct-SSD-put RPCs (AllocateWriteSlot /
  // CommitSsdWrite) were removed in the SSD-tier redesign: SSD is now an
  // async copy-on-commit cold tier, not a writer-driven put target.
  // PrepareSsdRead is key-based (the peer looks up the SSD location by key via
  // PeerSsdManager) and returns a typed status + the actual size; ReleaseSsdLease
  // is a best-effort fast release (slots are also reclaimed by lease TTL).
  rpc PrepareSsdRead   (PrepareSsdReadRequest)   returns (PrepareSsdReadResponse);
  rpc ReleaseSsdLease  (ReleaseSsdLeaseRequest)  returns (ReleaseSsdLeaseResponse);

  // DRAM/HBM allocator + key map (new — peer is now the canonical owner).
  rpc AllocateSlot(AllocateSlotRequest) returns (AllocateSlotResponse);
  rpc CommitSlot  (CommitSlotRequest)   returns (CommitSlotResponse);
  rpc AbortSlot   (AbortSlotRequest)    returns (AbortSlotResponse);
  rpc ResolveKey  (ResolveKeyRequest)   returns (ResolveKeyResponse);
  rpc EvictKey    (EvictKeyRequest)     returns (EvictKeyResponse);

  rpc BatchAllocateSlots(BatchAllocateSlotsRequest) returns (BatchAllocateSlotsResponse);
  rpc BatchCommitSlots  (BatchCommitSlotsRequest)   returns (BatchCommitSlotsResponse);
  rpc BatchAbortSlots   (BatchAbortSlotsRequest)    returns (BatchAbortSlotsResponse);
  rpc BatchResolveKeys  (BatchResolveKeysRequest)   returns (BatchResolveKeysResponse);
}

// ============================================================
//  Handshake
// ============================================================

message GetPeerInfoRequest {}
message GetPeerInfoResponse {
  bytes  engine_desc           = 1;
  // SSD capacity is reported via heartbeat tier_capacities, not here.
  bytes  ssd_staging_mem_desc  = 6;  // packed MemoryDesc for dedicated SSD staging buffer
  uint64 ssd_staging_size      = 7;  // total staging buffer size

  // DRAM/HBM buffer descriptors — peer-owned in the new design, exposed
  // here so writers can hydrate first-contact peers without going through
  // AllocateSlot or ResolveKey first.
  repeated BufferMemoryDesc dram_memory_descs = 8;
  uint64 dram_page_size                       = 9;
}

// ============================================================
//  SSD read staging (key-based; see the UMBPPeer service comment above)
// ============================================================

// Per-key SSD read outcome.  Callers MUST distinguish a transient failure
// (NO_SLOT) from a definitive miss (NOT_FOUND): a transient failure must never
// be surfaced to hicache as a cache miss.  Lease expiry is NOT a wire status:
// the reader decides it locally against lease_ttl_ms and the peer reclaims the
// slot by TTL (see PrepareSsdReadResponse).
enum SsdReadStatus {
  SSD_READ_OK             = 0;
  SSD_READ_NOT_FOUND      = 1;   // key not on this peer's SSD tier → caller treats as miss
  SSD_READ_NO_SLOT        = 2;   // staging slots exhausted → transient/retryable, not a miss
  SSD_READ_SIZE_TOO_LARGE = 3;   // actual size > reader cap / staging slot size
  SSD_READ_ERROR          = 4;   // backend read error (e.g. concurrent evict / corruption)
}

message PrepareSsdReadRequest {
  string key      = 1;
  // Reader's destination buffer size (capacity upper bound).  The peer rejects
  // with SSD_READ_SIZE_TOO_LARGE when the key's actual size exceeds it.
  uint64 max_size = 2;
}
message PrepareSsdReadResponse {
  SsdReadStatus status        = 1;
  uint64        staging_offset = 2;   // offset into the published ssd_staging_mem_desc
  uint64        size           = 3;   // actual readable bytes
  uint64        lease_id       = 4;
  uint64        lease_ttl_ms   = 5;
}

message ReleaseSsdLeaseRequest {
  uint64 lease_id = 1;
}
message ReleaseSsdLeaseResponse {
  bool success = 1;
}

// ============================================================
//  DRAM/HBM allocator + key map (new)
// ============================================================

// Reserve a peer-local pending slot for `size` bytes on `tier`.  Failure
// modes (ENOSPC etc.) are signaled via `outcome`, not an RPC error, so
// the writer can retry RoutePut with `exclude_nodes`.  `slot_id` is
// opaque; echoed back by Commit / Abort.
message AllocateSlotRequest {
  uint64   size = 1;
  TierType tier = 2;
  string   key  = 3;  // owned_ dedup (master-index-lag fallback)
  KvEncodingDescriptor encoding = 4;
}
// AllocateSlot / BatchAllocateSlots per-entry outcome.
// FAILED_NO_SPACE is split out so the writer can keep retrying with
// `exclude_nodes` — every other failure either is a transient/config
// issue (where retrying makes no sense) or is fully diagnosed in the
// peer's own log; client just sees the bucketed FAILED.
enum AllocateSlotOutcome {
  ALLOCATE_SLOT_OUTCOME_UNSPECIFIED            = 0;  // wire default; should not appear in healthy traffic
  ALLOCATE_SLOT_OUTCOME_SUCCESS_ALLOCATED      = 1;
  ALLOCATE_SLOT_OUTCOME_SUCCESS_ALREADY_EXISTS = 2;  // owned_[key] dedup hit
  ALLOCATE_SLOT_OUTCOME_FAILED                 = 3;  // generic — see peer log for reason
  ALLOCATE_SLOT_OUTCOME_FAILED_NO_SPACE        = 4;  // tier exhausted; retry on another peer
}

message AllocateSlotResponse {
  AllocateSlotOutcome outcome        = 1;
  uint64              slot_id        = 2;
  repeated PageLocation       pages  = 3;
  uint64              page_size      = 4;
  repeated BufferMemoryDesc   descs  = 5;  // dedup'd by buffer_index
  uint64              pending_ttl_ms = 6;  // single TTL in the system
}

// Commit moves pending → owned.  After a successful commit the peer
// queues a KvEvent{ADD, key, tier, size} for the next heartbeat.
message CommitSlotRequest {
  uint64 slot_id = 1;
  string key     = 2;
}
message CommitSlotResponse {
  bool success = 1;  // false if slot already reaped or unknown
}

// Abort drops a pending slot.  Idempotent: late or duplicate Abort for
// an already-reaped slot returns success=true.
message AbortSlotRequest {
  uint64 slot_id = 1;
}
message AbortSlotResponse {
  bool success = 1;
}

// Resolve a key the writer has been routed to.  Returns the page set
// the reader needs to RDMA from.  Peer bumps its in-flight read counter
// for `key` to defer concurrent eviction.
message ResolveKeyRequest {
  string key = 1;
}
message ResolveKeyResponse {
  bool   found     = 1;
  repeated PageLocation pages = 2;
  uint64 page_size = 3;
  repeated BufferMemoryDesc descs = 4;
  uint64 size      = 5;
  KvEncodingDescriptor encoding = 6;
}

// Master-driven eviction.  Idempotent: already-evicted keys produce a
// zero-bytes entry or are omitted; master tolerates either since the
// REMOVE events shipped on the next heartbeat are the source of truth.
message EvictKeyEntry {
  string key         = 1;
  uint64 bytes_freed = 2;  // 0 if the key was already gone or held a read lease
}
message EvictKeyRequest {
  repeated string keys = 1;
}
message EvictKeyResponse {
  repeated EvictKeyEntry evicted = 1;
}

// ============================================================
//  Batch variants
// ============================================================

message BatchAllocateSlotsRequest {
  repeated AllocateSlotRequest entries = 1;
}
message BatchAllocateSlotsResponse {
  repeated AllocateSlotResponse entries = 1;
}

message BatchCommitSlotEntry {
  uint64 slot_id = 1;
  string key     = 2;
}
message BatchCommitSlotsRequest {
  repeated BatchCommitSlotEntry entries = 1;
}
message BatchCommitSlotsResponse {
  repeated bool success = 1;
}

message BatchAbortSlotsRequest {
  repeated uint64 slot_ids = 1;
}
message BatchAbortSlotsResponse {
  repeated bool success = 1;
}

message BatchResolveKeysRequest {
  repeated string keys = 1;
  // When set, the peer omits the per-buffer descriptors from the response: the
  // client has already hydrated buffer_index -> MemoryDesc from GetPeerInfo
  // (dram_memory_descs) and the read path looks descriptors up in that cache.
  // A wrongly-omitted descriptor degrades to a cache miss on the client (the
  // transfer-build guard rejects the entry), never to a corrupt read.
  bool omit_descs = 2;
}
// Struct-of-arrays layout.  The previous shape repeated a full ResolveKeyResponse
// per key, each carrying its own copy of the peer's buffer descriptors and
// page_size — the descriptors and page_size are batch-invariant, so that
// duplicated O(keys * buffers) payload per BatchGet.  Here the descriptors are
// deduplicated once per batch (by buffer_index), page_size is hoisted to a
// single field, the per-key fixed fields live in parallel arrays (index i ==
// request.keys[i]), and every key's page locations are flattened into
// buffer_index/page_index with page_count[i] delimiting key i's slice.  This
// removes the per-key sub-message framing and the descriptor duplication.
message BatchResolveKeysResponse {
  // Deduplicated buffer descriptors, once per batch (empty when the request set
  // omit_descs, or when no resolved key was found).
  repeated BufferMemoryDesc descs = 1;
  // Peer-global page size.
  uint64 page_size = 2;
  // Per-key fixed fields, parallel to request.keys.
  repeated bool     found      = 3;
  repeated TierType tier       = 4;
  repeated uint64   size       = 5;
  repeated uint32   page_count = 6;
  // Flattened page locations across all keys: key i owns the next page_count[i]
  // (buffer_index, page_index) pairs, walking keys in order.
  repeated uint32 buffer_index = 7;
  repeated uint32 page_index   = 8;
  // Per-key encoding descriptors, parallel to found/tier/size. Older peers may
  // omit this; clients treat missing descriptors as raw bytes.
  repeated KvEncodingDescriptor encoding = 9;
}
