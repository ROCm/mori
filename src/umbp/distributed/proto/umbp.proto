syntax = "proto3";
package umbp;

// ============================================================
//  Core types
// ============================================================

enum TierType {
  TIER_UNKNOWN = 0;
  TIER_HBM     = 1;   // GPU High Bandwidth Memory
  TIER_DRAM    = 2;   // CPU DRAM
  TIER_SSD     = 3;   // NVMe SSD
}

// Per-tier capacity reported by a peer node.  Master treats every value
// as ground truth and applies it unconditionally — the peer's allocator
// is the single source of physical capacity.
message TierCapacity {
  TierType tier                     = 1;
  uint64   total_capacity_bytes     = 2;   // Total capacity on this tier
  uint64   available_capacity_bytes = 3;   // Current free capacity on this tier
}

// One page slot inside one of a node's DRAM/HBM buffers.  Carried by the
// peer service in AllocateSlot / ResolveKey responses; master never sees
// this type after the redesign (master holds no per-page state).
message PageLocation {
  uint32 buffer_index = 1;
  uint32 page_index   = 2;
}

// One DRAM/HBM buffer's RDMA MemoryDesc plus the buffer_index it belongs
// to.  Peer responses ship a deduplicated, ascending list so the writer
// can hydrate its peer-side buffer_index → MemoryDesc cache in one batch.
message BufferMemoryDesc {
  uint32 buffer_index = 1;
  bytes  desc         = 2;  // msgpack-packed mori::io::MemoryDesc
}

// ============================================================
//  Client lifecycle
// ============================================================

enum ClientStatus {
  CLIENT_STATUS_UNKNOWN = 0;
  CLIENT_STATUS_ALIVE   = 1;
  CLIENT_STATUS_EXPIRED = 2;
}

// Master no longer owns DRAM/HBM allocators, so descs / buffer sizes /
// page sizes have moved to the peer.  ssd_store_capacities stays as
// advisory capacity metadata for the routing strategy.  engine_desc is
// retained so writers can resolve the target peer's IO engine without
// an extra GetPeerInfo round trip on first contact.
message RegisterClientRequest {
  string node_id                      = 1;
  string node_address                 = 2;   // Network address (e.g. "10.0.1.5:8080")
  repeated TierCapacity tier_capacities = 3; // Capacity per tier
  string peer_address                 = 4;   // PeerService gRPC address
  bytes  engine_desc                  = 5;   // packed EngineDesc
  repeated uint64 ssd_store_capacities = 12; // per-SSD-store capacity in bytes
  repeated string tags                = 13;  // opaque key=value labels (e.g. "sgl_role=prefill")
}
message RegisterClientResponse {
  uint64 heartbeat_interval_ms = 1;  // Recommended heartbeat interval
  uint64 ack_seq               = 2;  // Initial heartbeat seq peer should send (= 0)
}

message UnregisterClientRequest {
  string node_id = 1;
}
message UnregisterClientResponse {}

// ============================================================
//  Heartbeat / event-shipping (the new authoritative update channel)
// ============================================================

// One mutation in the peer's owned-key set.  ADD carries `size`; REMOVE
// elides it because master already knows the size from the prior ADD.
message KvEvent {
  enum Kind {
    ADD    = 0;
    REMOVE = 1;
  }
  Kind     kind = 1;
  string   key  = 2;
  TierType tier = 3;
  uint64   size = 4;   // ADD only
}

// Per-tier live owned-key count snapshot reported by the client.
// Authoritative — taken directly from the client's local block index.
message TierKvCount {
  TierType tier  = 1;
  uint64   count = 2;
}

message HeartbeatRequest {
  string node_id            = 1;
  uint64 seq                = 2;    // monotonic, peer-assigned (1 per heartbeat batch)
  uint64 last_acked_seq     = 3;    // echo of master's last ack
  repeated TierCapacity tier_capacities = 4; // ground truth from peer's allocator
  repeated KvEvent      events          = 5; // adds + removes since last_acked_seq
  bool   is_full_sync       = 6;    // when true, events[] is the complete owned-key set
  repeated TierKvCount  tier_kv_counts  = 7; // live owned-key count per tier (client-reported)
}
message HeartbeatResponse {
  ClientStatus status            = 1;
  uint64       acked_seq         = 2;  // master applied up to this seq
  bool         request_full_sync = 3;  // master detected gap; peer reships
}

// ============================================================
//  Router (read-only on master state; pure routing advisor)
// ============================================================

message RoutePutRequest {
  string key                   = 1;
  string node_id               = 2;   // Requesting client (locality hints / metrics)
  uint64 block_size            = 3;   // Size of the block to write (bytes)
  repeated string exclude_nodes = 4;  // Nodes the caller has already failed against
}
message RoutePutResponse {
  bool     found        = 1;
  string   node_id      = 2;
  TierType tier         = 3;
  string   peer_address = 4;
}

message RouteGetRequest {
  string key                    = 1;
  string node_id                = 2;
  repeated string exclude_nodes = 3;
}
message RouteGetResponse {
  bool     found        = 1;
  string   node_id      = 2;
  TierType tier         = 3;
  uint64   size         = 4;
  string   peer_address = 5;
}

// ============================================================
//  Batch routing
// ============================================================

message BatchRoutePutRequest {
  string node_id = 1;
  repeated string keys = 2;
  repeated uint64 block_sizes = 3;
  repeated string exclude_nodes = 4;  // global exclude — applies to every entry
}
// BatchRoutePut per-key result.  Only ROUTED populates node_id / tier /
// peer_address; the other states leave them empty.
enum RoutePutOutcome {
  ROUTE_PUT_OUTCOME_UNAVAILABLE    = 0;  // no alive client / no capacity
  ROUTE_PUT_OUTCOME_ROUTED         = 1;
  ROUTE_PUT_OUTCOME_ALREADY_EXISTS = 2;  // master-side dedup hit
}

message BatchRoutePutEntry {
  RoutePutOutcome outcome      = 1;
  string          node_id      = 2;
  TierType        tier         = 3;
  string          peer_address = 4;
}
message BatchRoutePutResponse {
  repeated BatchRoutePutEntry entries = 1;
}

message BatchRouteGetRequest {
  string node_id = 1;
  repeated string keys = 2;
  repeated string exclude_nodes = 3;
}
message BatchRouteGetEntry {
  bool     found        = 1;
  string   node_id      = 2;
  TierType tier         = 3;
  uint64   size         = 4;
  string   peer_address = 5;
}
message BatchRouteGetResponse {
  repeated BatchRouteGetEntry entries = 1;
}

// Read-only batched existence probe.  Unlike BatchRouteGet, this does
// not bump RecordAccess / GrantLease on the index and emits no per-node
// RouteGet counters — used by PoolClient::Exists / BatchExists for the
// sglang probe path where the caller only wants to know "is the key
// resident?" and is not about to RDMA-read it.
message BatchLookupRequest {
  // Caller node_id; carried for parity with other RPCs (audit / future
  // tagging).  Server currently ignores it.
  string node_id = 1;
  repeated string keys = 2;
}
message BatchLookupResponse {
  // Parallel to BatchLookupRequest.keys; found[i] corresponds to keys[i].
  repeated bool found = 1;
}

// ============================================================
//  Client-side metrics reporting (unchanged)
// ============================================================

message MetricLabel {
  string name  = 1;
  string value = 2;
}

// Aggregated histogram state. bucket_counts is CUMULATIVE
// (bucket_counts[i] = #observations with value <= bounds[i]); the implicit
// +Inf overflow is `count - bucket_counts.back()`. Mirrors the in-memory
// representation already used by master MetricsServer::HistogramEntry, so
// merge on the master side is a per-bucket add.
message HistogramAggregate {
  repeated double bounds        = 1;
  repeated uint64 bucket_counts = 2;
  uint64          count         = 3;
  double          sum           = 4;
}

message MetricSample {
  string               name    = 1;
  string               help    = 2;
  repeated MetricLabel labels  = 3;
  oneof value {
    double             counter_delta       = 4;
    double             gauge_value         = 5;
    HistogramAggregate histogram_aggregate = 6;
  }
}

message ReportMetricsRequest {
  string               node_id = 1;
  repeated MetricSample metrics = 2;
}
message ReportMetricsResponse {}

// ============================================================
//  External KV Block Events (unmanaged L1/L2 cache blocks)
// ============================================================

message ReportExternalKvBlocksRequest {
  string node_id         = 1;
  repeated string hashes = 2;
  TierType tier          = 3;
}
message ReportExternalKvBlocksResponse {}

// Revoke specific hashes from a single tier on this node.  The same (node,
// hash) pair may live on multiple tiers simultaneously — only the named tier
// is removed; other tier buckets are untouched.
message RevokeExternalKvBlocksRequest {
  string node_id         = 1;
  repeated string hashes = 2;
  TierType tier          = 3;
}
message RevokeExternalKvBlocksResponse {}

// Bulk-revoke every hash currently registered by this node at the given tier
// (e.g. issued when the node clears or detaches its storage backend).  Other
// tiers for those same hashes are untouched.
message RevokeAllExternalKvBlocksAtTierRequest {
  string node_id = 1;
  TierType tier  = 2;
}
message RevokeAllExternalKvBlocksAtTierResponse {}

message MatchExternalKvRequest {
  repeated string hashes = 1;
}
// Per-tier bucket of matched hashes for a single node.
// proto3 disallows map<int, repeated_string>, so we use a wrapper.
message TierHashes {
  TierType tier          = 1;
  repeated string hashes = 2;
}
message ExternalKvNodeMatch {
  string node_id                     = 1;
  string peer_address                = 2;
  // Matched hashes grouped by the tier they live on for this node.
  // A single (node, hash) pair MAY appear in more than one tier bucket when
  // the node holds multiple physical copies (e.g. write_through created a
  // CPU mirror while the GPU copy is still alive).  Total matched-block
  // count for the node = size of the union across buckets, NOT the sum.
  repeated TierHashes hashes_by_tier = 3;
}
message MatchExternalKvResponse {
  repeated ExternalKvNodeMatch matches = 1;
}


// ============================================================
//  Service
// ============================================================

service UMBPMaster {
  // Client lifecycle
  rpc RegisterClient  (RegisterClientRequest)   returns (RegisterClientResponse);
  rpc UnregisterClient(UnregisterClientRequest) returns (UnregisterClientResponse);
  rpc Heartbeat       (HeartbeatRequest)        returns (HeartbeatResponse);

  // Router (read-only)
  rpc RouteGet        (RouteGetRequest)         returns (RouteGetResponse);
  rpc RoutePut        (RoutePutRequest)         returns (RoutePutResponse);

  // Batch
  rpc BatchRoutePut   (BatchRoutePutRequest)    returns (BatchRoutePutResponse);
  rpc BatchRouteGet   (BatchRouteGetRequest)    returns (BatchRouteGetResponse);
  rpc BatchLookup     (BatchLookupRequest)      returns (BatchLookupResponse);

  // External KV block events
  rpc ReportExternalKvBlocks         (ReportExternalKvBlocksRequest)
      returns (ReportExternalKvBlocksResponse);
  rpc RevokeExternalKvBlocks         (RevokeExternalKvBlocksRequest)
      returns (RevokeExternalKvBlocksResponse);
  rpc RevokeAllExternalKvBlocksAtTier(RevokeAllExternalKvBlocksAtTierRequest)
      returns (RevokeAllExternalKvBlocksAtTierResponse);
  rpc MatchExternalKv                (MatchExternalKvRequest)
      returns (MatchExternalKvResponse);

  // Client-side metrics reporting
  rpc ReportMetrics(ReportMetricsRequest) returns (ReportMetricsResponse);
}
