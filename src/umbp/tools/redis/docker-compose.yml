# Independent RESP store containers for the UMBP master Redis-metadata backend.
#
# Run these ON THE HOST, next to the (host-networked) app container. Every
# service uses `network_mode: host`, so the app container reaches them at
# 127.0.0.1:<port> with no port mapping — the same URIs the tests/bench already
# use. This is the productized replacement for building redis-server from source
# inside the app container (see run_local_backends.sh, kept only as the
# no-docker fallback).
#
# Profiles (one topology at a time):
#   single    -> Redis 7 on 6379                     (default; existing tests/bench)
#   dragonfly -> Dragonfly on 6380                   (multi-threaded RESP; portability)
#   cluster   -> 3 masters + 3 replicas on 7000-7005 (Redis Cluster: failover/HA)
#
# Use the store.sh wrapper, or directly:
#   docker compose -f docker-compose.yml --profile single  up -d
#   docker compose -f docker-compose.yml --profile cluster up -d   # cluster-init forms it
#   docker compose -f docker-compose.yml --profile cluster down -v
#
# NOTE: cluster nodes are announced at 127.0.0.1 (single-host verification). For
# a multi-host cluster, set CLUSTER_ANNOUNCE_IP to the host's routable IP so
# nodes advertise a reachable address.

name: umbp-store

x-cluster-node: &cluster-node
  image: redis:7-alpine
  network_mode: host
  restart: unless-stopped
  profiles: ["cluster"]

services:
  # ---- single Redis (default) --------------------------------------------
  redis:
    image: redis:7-alpine
    network_mode: host
    profiles: ["single"]
    restart: unless-stopped
    command:
      ["redis-server", "--port", "6379",
       "--appendonly", "yes", "--appendfsync", "everysec", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # ---- Dragonfly (multi-threaded RESP) -----------------------------------
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    network_mode: host
    profiles: ["dragonfly"]
    restart: unless-stopped
    ulimits:
      memlock: -1
    # allow-undeclared-keys: single-node Lua scripts derive same-slot auxiliary
    # keys from the shared hash tag instead of passing every one via KEYS[].
    command:
      ["dragonfly", "--port", "6380",
       "--default_lua_flags=allow-undeclared-keys", "--logtostderr"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # ---- Redis Cluster: 3 masters + 3 replicas -----------------------------
  redis-c0:
    <<: *cluster-node
    command: &cluster-cmd
      ["redis-server", "--port", "7000", "--cluster-enabled", "yes",
       "--cluster-config-file", "/tmp/nodes-7000.conf",
       "--cluster-node-timeout", "5000",
       "--cluster-announce-ip", "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}",
       "--appendonly", "no", "--save", "", "--dir", "/tmp"]
  redis-c1:
    <<: *cluster-node
    command:
      ["redis-server", "--port", "7001", "--cluster-enabled", "yes",
       "--cluster-config-file", "/tmp/nodes-7001.conf",
       "--cluster-node-timeout", "5000",
       "--cluster-announce-ip", "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}",
       "--appendonly", "no", "--save", "", "--dir", "/tmp"]
  redis-c2:
    <<: *cluster-node
    command:
      ["redis-server", "--port", "7002", "--cluster-enabled", "yes",
       "--cluster-config-file", "/tmp/nodes-7002.conf",
       "--cluster-node-timeout", "5000",
       "--cluster-announce-ip", "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}",
       "--appendonly", "no", "--save", "", "--dir", "/tmp"]
  redis-c3:
    <<: *cluster-node
    command:
      ["redis-server", "--port", "7003", "--cluster-enabled", "yes",
       "--cluster-config-file", "/tmp/nodes-7003.conf",
       "--cluster-node-timeout", "5000",
       "--cluster-announce-ip", "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}",
       "--appendonly", "no", "--save", "", "--dir", "/tmp"]
  redis-c4:
    <<: *cluster-node
    command:
      ["redis-server", "--port", "7004", "--cluster-enabled", "yes",
       "--cluster-config-file", "/tmp/nodes-7004.conf",
       "--cluster-node-timeout", "5000",
       "--cluster-announce-ip", "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}",
       "--appendonly", "no", "--save", "", "--dir", "/tmp"]
  redis-c5:
    <<: *cluster-node
    command:
      ["redis-server", "--port", "7005", "--cluster-enabled", "yes",
       "--cluster-config-file", "/tmp/nodes-7005.conf",
       "--cluster-node-timeout", "5000",
       "--cluster-announce-ip", "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}",
       "--appendonly", "no", "--save", "", "--dir", "/tmp"]

  # One-shot: wait for all nodes, then form the cluster (idempotent).
  cluster-init:
    image: redis:7-alpine
    network_mode: host
    profiles: ["cluster"]
    restart: "no"
    depends_on: [redis-c0, redis-c1, redis-c2, redis-c3, redis-c4, redis-c5]
    environment:
      CLUSTER_ANNOUNCE_IP: "${CLUSTER_ANNOUNCE_IP:-127.0.0.1}"
    command:
      - sh
      - -c
      - |
        set -e
        IP="${CLUSTER_ANNOUNCE_IP:-127.0.0.1}"
        for p in 7000 7001 7002 7003 7004 7005; do
          until redis-cli -h "$$IP" -p "$$p" ping 2>/dev/null | grep -q PONG; do sleep 1; done
        done
        if redis-cli -h "$$IP" -p 7000 cluster info 2>/dev/null | grep -q "cluster_state:ok"; then
          echo "[cluster-init] cluster already formed"; exit 0
        fi
        redis-cli --cluster create \
          "$$IP:7000" "$$IP:7001" "$$IP:7002" "$$IP:7003" "$$IP:7004" "$$IP:7005" \
          --cluster-replicas 1 --cluster-yes
        redis-cli -h "$$IP" -p 7000 cluster info | grep cluster_state
