syntax = "proto3";

package kv_indexer.v1;

// Storage tier for externally managed KV cache blocks.
enum TierType {
  TIER_UNKNOWN = 0;
  TIER_HBM = 1;
  TIER_DRAM = 2;
  TIER_SSD = 3;
}

message Empty {}

message ReportExternalKvBlocksRequest {
  string worker_id = 1;
  repeated string hashes = 2;
  TierType tier = 3;
}

message RevokeExternalKvBlocksRequest {
  string worker_id = 1;
  repeated string hashes = 2;
  TierType tier = 3;
}

message RevokeAllExternalKvBlocksAtTierRequest {
  string worker_id = 1;
  TierType tier = 2;
}

message MatchExternalKvRequest {
  // MVP semantics: these are block-level hashes to match against placement
  // metadata. The indexer returns block placement matches and does not compute
  // the longest reusable prefix.
  repeated string hashes = 1;

  // When true, only hashes that are actually matched should increase hit
  // counters. Diagnostic callers should leave this false.
  bool count_as_hit = 2;
}

// The kind of mutation a single ExternalKvAction carries. Mirrors the three
// legacy single-mutation RPCs so a whole SGLang KVEventBatch can be applied in
// one call while preserving the exact per-action ordering.
enum ExternalKvActionType {
  ACTION_UNKNOWN = 0;
  ACTION_REPORT = 1;             // like ReportExternalKvBlocks
  ACTION_REVOKE = 2;             // like RevokeExternalKvBlocks
  ACTION_CLEAR_ALL_AT_TIER = 3;  // like RevokeAllExternalKvBlocksAtTier
}

message ExternalKvAction {
  ExternalKvActionType type = 1;
  TierType tier = 2;
  // Non-empty for REPORT/REVOKE; ignored for CLEAR_ALL_AT_TIER.
  repeated string hashes = 3;
}

message ApplyExternalKvBatchRequest {
  string worker_id = 1;
  // The SGLang batch sequence number. Carried as metadata / idempotency key;
  // the indexer does not gate ordering on it (the bridge is the seq authority).
  uint64 seq = 2;
  repeated ExternalKvAction actions = 3;
  // The worker's KV-transfer address, used to populate MatchExternalKvResponse.
  // Supplied by the bridge; may be empty (e.g. legacy callers that never set it),
  // in which case matches for this worker carry an empty address.
  string worker_address = 4;
}

// Empty for now; reserved so an ack (e.g. last_applied_seq) can be added later
// without a breaking change.
message ApplyExternalKvBatchResponse {}

message TierHashes {
  TierType tier = 1;
  repeated string hashes = 2;
}

message ExternalKvNodeMatch {
  string worker_id = 1;
  string address = 2;
  repeated TierHashes hashes_by_tier = 3;
}

message MatchExternalKvResponse {
  repeated ExternalKvNodeMatch matches = 1;
}

message HitCountEntry {
  string hash = 1;
  uint64 hit_count_total = 2;
}

message GetExternalKvHitCountsRequest {
  repeated string hashes = 1;
}

message GetExternalKvHitCountsResponse {
  repeated HitCountEntry entries = 1;
}

service KVIndexer {
  rpc ReportExternalKvBlocks(ReportExternalKvBlocksRequest) returns (Empty);
  rpc RevokeExternalKvBlocks(RevokeExternalKvBlocksRequest) returns (Empty);
  rpc RevokeAllExternalKvBlocksAtTier(RevokeAllExternalKvBlocksAtTierRequest) returns (Empty);
  rpc MatchExternalKv(MatchExternalKvRequest) returns (MatchExternalKvResponse);
  rpc GetExternalKvHitCounts(GetExternalKvHitCountsRequest) returns (GetExternalKvHitCountsResponse);

  // Applies a whole SGLang KVEventBatch in one call. Preferred over the three
  // single-mutation RPCs above, which are kept for backward compatibility.
  rpc ApplyExternalKvBatch(ApplyExternalKvBatchRequest) returns (ApplyExternalKvBatchResponse);
}
